<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- PWA Meta Tags -->
  <meta name="application-name" content="SkinCheck" />
  <meta name="description"
    content="AI-powered skin cancer detection and analysis using deep learning and Grad-CAM visualization." />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SkinCheck" />
  <meta name="msapplication-TileColor" content="#0a0a0a" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/icon-192.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-apple.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinCheck</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>

</html>
